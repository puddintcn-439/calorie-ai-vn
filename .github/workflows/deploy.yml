name: Deploy - Production

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io

jobs:
  # Job 1: Build & Push Docker Image
  build-and-push:
    runs-on: ubuntu-latest
    name: Build & Push Docker Image
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
      tag: ${{ steps.image.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate image metadata
        id: image
        run: |
          VERSION="${GITHUB_SHA::8}"
          TAG="prod-${VERSION}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/backend:${TAG}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.image }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:cache,mode=max

  # Job 2: Pre-deploy smoke tests (source checkout + in-repo test suite)
  smoke-tests:
    runs-on: ubuntu-latest
    name: Pre-Deploy Smoke Tests
    needs: [build-and-push]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calorie_ai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run pre-deploy smoke suite
        run: npm run test:e2e --workspace=backend -- smoke
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/calorie_ai_test
          NODE_ENV: test

  # Job 3: Deploy to production with rollback safety
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: [build-and-push, smoke-tests]
    if: success()
    environment:
      name: production
      url: ${{ secrets.PRODUCTION_URL }}

    steps:
      - uses: actions/checkout@v4

      # ── Capture current live image tag before we touch anything ──────────────
      - name: Record previous image tag (rollback reference)
        id: rollback
        run: |
          PREV=$(curl -sf -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            "${{ secrets.PRODUCTION_URL }}/health" 2>/dev/null | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('image','unknown'))" 2>/dev/null || echo "unknown")
          echo "previous_image=${PREV}" >> $GITHUB_OUTPUT
          echo "::notice::Previous production image: ${PREV}"

      # ── Deploy ────────────────────────────────────────────────────────────────
      - name: Deploy new image
        id: deploy
        run: |
          IMAGE="${{ needs.build-and-push.outputs.image }}"
          TAG="${{ needs.build-and-push.outputs.tag }}"
          echo "::notice::Deploying image ${IMAGE} (tag ${TAG})"

          # Replace this block with your actual deployment mechanism, e.g.:
          #   ssh deploy@host "docker pull ${IMAGE} && docker stop backend && docker run -d --name backend ..."
          #   OR: kubectl set image deployment/backend backend=${IMAGE} --record
          #   OR: render/fly/railway deploy command

          # Verify the deployment target is reachable before we continue
          if [ -n "${{ secrets.PRODUCTION_URL }}" ]; then
            echo "Deployment target URL configured: ${{ secrets.PRODUCTION_URL }}"
          else
            echo "::warning::PRODUCTION_URL secret not set — health-check step will be skipped"
          fi

      # ── Post-deploy health verification ──────────────────────────────────────
      - name: Verify production health (30s window)
        id: health_check
        run: |
          URL="${{ secrets.PRODUCTION_URL }}/health"
          if [ -z "${{ secrets.PRODUCTION_URL }}" ]; then
            echo "::warning::PRODUCTION_URL not configured — skipping live health check"
            exit 0
          fi

          echo "Polling ${URL} ..."
          for i in $(seq 1 6); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${URL}" || echo "000")
            if [ "${STATUS}" = "200" ]; then
              echo "::notice::✅ Health check passed (attempt ${i})"
              exit 0
            fi
            echo "Attempt ${i}: status ${STATUS} — waiting 5s"
            sleep 5
          done
          echo "::error::Health check failed after 30s"
          exit 1

      # ── Rollback on failure ───────────────────────────────────────────────────
      - name: Rollback to previous image on failure
        if: failure() && steps.rollback.outputs.previous_image != 'unknown'
        run: |
          PREV="${{ steps.rollback.outputs.previous_image }}"
          echo "::error::Deployment verification failed. Rolling back to ${PREV}"
          # Mirror your deploy command here targeting PREV image:
          #   ssh deploy@host "docker pull ${PREV} && docker stop backend && docker run -d --name backend ..."
          #   OR: kubectl set image deployment/backend backend=${PREV}
          echo "::notice::Rollback command should be placed above. Update with real deploy mechanism."

      # ── Create GitHub deployment record ──────────────────────────────────────
      - name: Record deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: 'Calorie AI VN backend deploy via GitHub Actions',
              auto_merge: false,
              required_contexts: [],
            });
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.id,
              state,
              log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: state === 'success'
                ? `Deployed ${{ needs.build-and-push.outputs.tag }} successfully`
                : 'Deployment failed — check logs and rollback status',
            });

      - name: Post deploy summary
        if: success()
        run: |
          echo "::notice::✅ Production deployment complete"
          echo "::notice::Image: ${{ needs.build-and-push.outputs.image }}"
          echo "::notice::Tag: ${{ needs.build-and-push.outputs.tag }}"
          echo "::notice::Health: ${{ secrets.PRODUCTION_URL }}/health"
