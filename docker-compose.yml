version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: calorie-ai-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-calorie_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: calorie-ai-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-calorie_ai}
      # Do not default SUPABASE_URL to the Postgres listener. Leave empty
      # so the app falls back to a safe stub in local dev unless explicitly
      # provided via environment.
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-dev_service_key}
      GEMINI_API_KEY_PRIMARY: ${GEMINI_API_KEY_PRIMARY:-}
      GEMINI_API_KEY_BACKUP: ${GEMINI_API_KEY_BACKUP:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gemini-2.5-flash}
      AI_IMAGE_MODEL: ${AI_IMAGE_MODEL:-gemini-2.5-flash-lite}
      AI_MAX_OUTPUT_TOKENS: ${AI_MAX_OUTPUT_TOKENS:-2048}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      LOGS_DIR: /app/logs
      AI_SIMULATE_LOCAL_RESPONSE: ${AI_SIMULATE_LOCAL_RESPONSE:-false}
      AI_PROVIDER_TIMEOUT_MS: ${AI_PROVIDER_TIMEOUT_MS:-15000}
      AI_IMAGE_PROVIDER_TIMEOUT_MS: ${AI_IMAGE_PROVIDER_TIMEOUT_MS:-25000}
      AI_PROVIDER_RETRIES: ${AI_PROVIDER_RETRIES:-0}
    ports:
      - '3000:3000'
    volumes:
      - ./apps/backend/logs:/app/logs
      - ./tmp:/app/tmp
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Redis Cache (optional, for future optimization)
  redis:
    image: redis:7-alpine
    container_name: calorie-ai-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
