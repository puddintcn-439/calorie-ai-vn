name: Manual DB migration

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Run DB migration (manual)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Optional: Authenticate to GCP (to fetch secrets)
        if: ${{ secrets.GCP_SA_KEY != '' && secrets.GCP_PROJECT_ID != '' }}
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Optional: Fetch secrets from GCP Secret Manager
        if: ${{ secrets.GCP_SA_KEY != '' && secrets.GCP_PROJECT_ID != '' }}
        uses: google-github-actions/get-secretmanager-secrets@v0
        with:
          secrets: |
            projects/${{ secrets.GCP_PROJECT_ID }}/secrets/SUPABASE_DB_URL:env:SUPABASE_DB_URL

      - name: Validate SUPABASE_DB_URL secret
        shell: bash
        run: |
          DB_URL="${{ secrets.SUPABASE_DB_URL }}"
          if [ -z "$DB_URL" ]; then DB_URL="$SUPABASE_DB_URL"; fi
          if [ -z "$DB_URL" ]; then echo "ERROR: SUPABASE_DB_URL secret not provided"; exit 1; fi
          echo "Using SUPABASE_DB_URL: ${DB_URL:0:40}..."

      - name: Run migration
        shell: bash
        run: |
          DB_URL="${{ secrets.SUPABASE_DB_URL }}"
          if [ -z "$DB_URL" ]; then DB_URL="$SUPABASE_DB_URL"; fi
          export SUPABASE_DB_URL="$DB_URL"
          npm run migrate
