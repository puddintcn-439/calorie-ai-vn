name: Contribution conventions

on:
  pull_request:
    branches: [main, develop]
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate-naming:
    name: Validate branch, commits, and PR title
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Validate naming conventions
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          branch_pattern='^(feat|fix|update|refactor|docs|test|ci|chore|hotfix|release)/[a-z0-9][a-z0-9._/-]*$'
          subject_pattern='^(feat|fix|update|refactor|docs|test|ci|chore|hotfix|release)(\([a-z0-9._/-]+\))?!?: .+'

          if [[ ! "$HEAD_BRANCH" =~ $branch_pattern ]]; then
            echo "::error::Invalid branch '$HEAD_BRANCH'. Use type/kebab-case-description, for example feat/voice-food-logging."
            exit 1
          fi

          if [[ ! "$PR_TITLE" =~ $subject_pattern ]]; then
            echo "::error::Invalid PR title '$PR_TITLE'. Use type(scope): description without author/tool prefixes."
            exit 1
          fi

          invalid_commits=0
          while IFS= read -r subject; do
            if [[ ! "$subject" =~ $subject_pattern ]]; then
              echo "::error::Invalid commit subject '$subject'. Use type(scope): description."
              invalid_commits=1
            fi
          done < <(git log --format='%s' "$BASE_SHA"..HEAD)

          exit "$invalid_commits"
