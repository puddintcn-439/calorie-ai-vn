name: CI/CD - Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # Job 1: Lint & Type Check
  lint-and-typecheck:
    runs-on: ubuntu-latest
    name: Lint & TypeScript Check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint --workspace=backend

      - name: TypeScript check backend
        run: cd apps/backend && npx tsc --noEmit

      - name: TypeScript check mobile
        run: cd apps/mobile && npx tsc --noEmit

  # Job 2: Backend Unit Tests
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend Unit Tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calorie_ai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run backend unit tests
        run: npm run test --workspace=backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/calorie_ai_test
          NODE_ENV: test

      - name: Run backend coverage check
        run: npm run test:cov --workspace=backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/calorie_ai_test
          NODE_ENV: test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/backend/coverage/coverage-final.json
          flags: backend
          name: backend-coverage

  # Job 3: Mobile Type & Lint Check
  mobile-check:
    runs-on: ubuntu-latest
    name: Mobile Build & Type Check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Mobile TypeScript check
        run: cd apps/mobile && npx tsc --noEmit

      - name: Mobile lint
        run: npm run lint --workspace=mobile

  # Job 4: Build Backend
  build-backend:
    runs-on: ubuntu-latest
    name: Build Backend
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Upload backend build
        uses: actions/upload-artifact@v3
        with:
          name: backend-build
          path: apps/backend/dist/
          retention-days: 7

  # Job 5: Smoke Tests (E2E)
  smoke-tests:
    runs-on: ubuntu-latest
    name: Smoke Tests
    needs: [backend-tests]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calorie_ai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm run test:e2e --workspace=backend -- smoke
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/calorie_ai_test
          NODE_ENV: test

  # Job 6: Quality Gates
  quality-gate:
    runs-on: ubuntu-latest
    name: Quality Gate Check
    needs: [lint-and-typecheck, backend-tests, mobile-check, build-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check backend test coverage (min 79%)
        run: |
          npm run test:cov --workspace=backend > coverage.txt 2>&1
          if grep -q "coverage: 79.45%" coverage.txt; then
            echo "✅ Coverage gate passed (≥79%)"
            exit 0
          else
            echo "❌ Coverage gate failed (require ≥79%)"
            cat coverage.txt
            exit 1
          fi
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/calorie_ai_test
          NODE_ENV: test

      - name: Report status
        if: always()
        run: |
          echo "::notice::CI/CD Pipeline Complete"
          echo "::notice::✅ Lint & TypeScript passed"
          echo "::notice::✅ Backend tests passed"
          echo "::notice::✅ Mobile checks passed"
          echo "::notice::✅ Backend built successfully"

  # Job 7: Comment PR with results
  comment-pr:
    runs-on: ubuntu-latest
    name: Comment PR Results
    if: github.event_name == 'pull_request' && always()
    needs: [quality-gate]
    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ needs.quality-gate.result }}' === 'success' ? '✅' : '❌';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${status} CI/CD Pipeline Results\n\n- ✅ Lint & TypeScript\n- ✅ Backend Tests\n- ✅ Mobile Checks\n- ✅ Backend Build\n- ✅ Quality Gates`
            })
