name: CI smoke tests (integration)

on:
  workflow_dispatch:

jobs:
  smoke-tests-integration:
    name: Smoke tests (integration - real provider)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required secrets
        id: secret_check
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY_PRIMARY: ${{ secrets.GEMINI_API_KEY_PRIMARY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          missing=""
          if [ -z "$JWT_SECRET" ]; then missing="$missing JWT_SECRET"; fi
          if [ -z "$SUPABASE_SERVICE_KEY" ]; then missing="$missing SUPABASE_SERVICE_KEY"; fi
          if [ -z "$GEMINI_API_KEY_PRIMARY" ] && [ -z "$GEMINI_API_KEY" ]; then missing="$missing GEMINI_API_KEY_PRIMARY_or_GEMINI_API_KEY"; fi
          if [ -n "$missing" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping real-provider AI smoke test because required secrets are missing:$missing"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Required secrets are configured."
          fi

      - name: Setup Node
        if: steps.secret_check.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.secret_check.outputs.configured == 'true'
        run: npm ci

      - name: Ensure tools available
        if: steps.secret_check.outputs.configured == 'true'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq postgresql-client

      - name: Start Postgres service only
        if: steps.secret_check.outputs.configured == 'true'
        env:
          NODE_ENV: 'development'
        run: |
          docker compose -f docker-compose.yml up -d postgres

      - name: Wait for Postgres readiness
        if: steps.secret_check.outputs.configured == 'true'
        run: |
          echo "Waiting for postgres to accept connections..."
          for i in $(seq 1 40); do
            pg_isready -h localhost -p 5432 -U postgres && break || true
            echo "pg not ready, attempt $i"
            sleep 3
          done
          pg_isready -h localhost -p 5432 -U postgres || (docker compose -f docker-compose.yml logs postgres || true; exit 1)

      - name: Run DB migrations
        if: steps.secret_check.outputs.configured == 'true'
        env:
          SUPABASE_DB_URL: 'postgres://postgres:postgres@localhost:5432/calorie_ai'
        run: |
          npm run migrate

      - name: Start backend (real provider)
        if: steps.secret_check.outputs.configured == 'true'
        env:
          AI_SIMULATE_LOCAL_RESPONSE: 'false'
          NODE_ENV: 'development'
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY_PRIMARY: ${{ secrets.GEMINI_API_KEY_PRIMARY || secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_BACKUP: ${{ secrets.GEMINI_API_KEY_BACKUP || '' }}
          # For backwards compatibility some code may still read GEMINI_API_KEY
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_PRIMARY || secrets.GEMINI_API_KEY }}
        run: |
          docker compose -f docker-compose.yml up -d --build backend

      - name: Wait for backend /health
        if: steps.secret_check.outputs.configured == 'true'
        run: |
          set -e
          echo "Waiting for backend /health..."
          resp=""
          for i in $(seq 1 40); do
            echo "Attempt $i"
            resp=$(curl -sS http://localhost:3000/health || true)
            if echo "$resp" | grep -q '"status"' ; then
              echo "HEALTH OK"
              break
            fi
            sleep 3
          done
          if [ -z "$resp" ]; then
            docker compose -f docker-compose.yml logs backend || true
            echo "Backend /health did not respond"
            exit 1
          fi

      - name: Run AI integration smoke test
        if: steps.secret_check.outputs.configured == 'true'
        run: |
          set -euo pipefail
          echo "Posting AI integration request"
          body='{"text":"1 to pho bo"}'
          resp=$(curl -sS -X POST -H "Content-Type: application/json" -d "$body" http://localhost:3000/ai-debug/scan/text || true)
          success=$(echo "$resp" | jq -r '.success // false' || echo "false")
          provider=$(echo "$resp" | jq -r '.metadata.web_provider // .metadata.provider // .metadata.model // "unknown"' || echo "unknown")
          provider_duration_ms=$(echo "$resp" | jq -r '.metadata.provider_duration_ms // .metadata.duration_ms // 0' || echo "0")
          processing_ms=$(echo "$resp" | jq -r '.processing_ms // 0' || echo "0")
          total_calories=$(echo "$resp" | jq -r '.total_calories // 0' || echo "0")
          total_protein_g=$(echo "$resp" | jq -r '.total_protein_g // 0' || echo "0")
          total_carbs_g=$(echo "$resp" | jq -r '.total_carbs_g // 0' || echo "0")
          total_fat_g=$(echo "$resp" | jq -r '.total_fat_g // 0' || echo "0")
          echo "AI INTEGRATION RESULT: success=$success provider=$provider provider_duration_ms=$provider_duration_ms processing_ms=$processing_ms total_calories=$total_calories protein_g=$total_protein_g carbs_g=$total_carbs_g fat_g=$total_fat_g"
          if [ "$success" != "true" ]; then
            msg=$(echo "$resp" | jq -r '.error // .message // ""' | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g')
            status_code=$(echo "$resp" | jq -r '.statusCode // "unknown"' || echo "unknown")
            raw_ai_response=$(echo "$resp" | jq -r '.raw_ai_response // ""' 2>/dev/null | head -c 1200 || true)
            echo "AI_INTEGRATION_HTTP_STATUS: $status_code"
            if [ -n "$msg" ]; then
              echo "AI_INTEGRATION_MESSAGE: $msg"
            fi
            if [ -n "$raw_ai_response" ]; then
              echo "AI_INTEGRATION_RAW_AI_RESPONSE_BEGIN"
              echo "$raw_ai_response"
              echo "AI_INTEGRATION_RAW_AI_RESPONSE_END"
            fi
            echo "AI_INTEGRATION_BACKEND_LOGS_BEGIN"
            docker compose -f docker-compose.yml logs --no-color backend 2>/dev/null | tail -n 200 || true
            echo "AI_INTEGRATION_BACKEND_LOGS_END"
            if echo "$msg" | grep -qi '401\|unauthor' ; then
              echo "AI_INTEGRATION_ERROR_CATEGORY: Auth/credentials"
            elif echo "$msg" | grep -qi 'timeout\|timed out\|502\|504' ; then
              echo "AI_INTEGRATION_ERROR_CATEGORY: Timeout/latency"
            elif [ -n "$msg" ]; then
              echo "AI_INTEGRATION_ERROR_CATEGORY: Provider error"
            else
              echo "AI_INTEGRATION_ERROR_CATEGORY: Unknown"
            fi
            exit 1
          fi

      - name: Tear down
        if: always() && steps.secret_check.outputs.configured == 'true'
        run: |
          docker compose -f docker-compose.yml down --volumes --remove-orphans
