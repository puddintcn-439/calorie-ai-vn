name: Deploy - Production

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io

jobs:
  # Job 1: Build & Push Docker Image
  build-and-push:
    runs-on: ubuntu-latest
    name: Build & Push Docker Image
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.image }}
      tag: ${{ steps.image.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate image metadata
        id: image
        run: |
          VERSION="${GITHUB_SHA::8}"
          TAG="prod-${VERSION}"
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/backend:${TAG}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.image }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/backend:cache,mode=max

  # Job 2: Run smoke tests before deploy
  smoke-tests:
    runs-on: ubuntu-latest
    name: Pre-Deploy Smoke Tests
    needs: [build-and-push]
    container:
      image: ${{ needs.build-and-push.outputs.image }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calorie_ai_prod
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests in container
        run: |
          npm run test:e2e -- smoke
        env:
          DATABASE_URL: postgres://postgres:postgres@postgres:5432/calorie_ai_prod
          NODE_ENV: production

  # Job 3: Deploy to production
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: [build-and-push, smoke-tests]
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend
        run: |
          echo "::notice::Deploying to production..."
          echo "Image: ${{ needs.build-and-push.outputs.image }}"
          echo "Tag: ${{ needs.build-and-push.outputs.tag }}"
          
          # Deployment steps would go here
          # - Update Kubernetes manifests
          # - Apply kubectl patches
          # - Verify rollout
          # - Run health check

      - name: Notify deployment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              description: 'Deployment via GitHub Actions',
              auto_merge: false,
              required_contexts: []
            })

      - name: Post deployment notification
        run: |
          echo "::notice::✅ Production deployment complete"
          echo "::notice::Image: ${{ needs.build-and-push.outputs.image }}"
          echo "::notice::Monitor: https://monitoring.example.com"
