name: Manual DB migration

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Run DB migration (manual)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Detect optional GCP Secret Manager config
        id: gcp-secret-manager
        shell: bash
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if [ -n "$GCP_SA_KEY" ] && [ -n "$GCP_PROJECT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "Optional: Authenticate to GCP (to fetch secrets)"
        if: ${{ steps.gcp-secret-manager.outputs.configured == 'true' }}
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: "Optional: Fetch secrets from GCP Secret Manager"
        if: ${{ steps.gcp-secret-manager.outputs.configured == 'true' }}
        uses: google-github-actions/get-secretmanager-secrets@v0
        with:
          secrets: |
            projects/${{ secrets.GCP_PROJECT_ID }}/secrets/SUPABASE_DB_URL:env:SUPABASE_DB_URL

      - name: Validate SUPABASE_DB_URL secret
        shell: bash
        run: |
          DB_URL="${{ secrets.SUPABASE_DB_URL }}"
          if [ -z "$DB_URL" ]; then DB_URL="$SUPABASE_DB_URL"; fi
          if [ -z "$DB_URL" ]; then echo "ERROR: SUPABASE_DB_URL secret not provided"; exit 1; fi
          echo "Using SUPABASE_DB_URL: ${DB_URL:0:40}..."

      - name: Run migration
        shell: bash
        run: |
          DB_URL="${{ secrets.SUPABASE_DB_URL }}"
          if [ -z "$DB_URL" ]; then DB_URL="$SUPABASE_DB_URL"; fi
          export SUPABASE_DB_URL="$DB_URL"
          npm run migrate
