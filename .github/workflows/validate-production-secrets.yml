name: Validate production secrets

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-secrets:
    name: Validate required production secrets
    runs-on: ubuntu-latest
    steps:
      - name: Detect optional GCP Secret Manager config
        id: gcp-secret-manager
        shell: bash
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if [ -n "$GCP_SA_KEY" ] && [ -n "$GCP_PROJECT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Optional: Authenticate to GCP (to fetch secrets)'
        if: ${{ steps.gcp-secret-manager.outputs.configured == 'true' }}
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 'Optional: Fetch secrets from GCP Secret Manager'
        if: ${{ steps.gcp-secret-manager.outputs.configured == 'true' }}
        uses: google-github-actions/get-secretmanager-secrets@v0
        with:
          secrets: |
            projects/${{ secrets.GCP_PROJECT_ID }}/secrets/GEMINI_API_KEY:env:GEMINI_API_KEY
            projects/${{ secrets.GCP_PROJECT_ID }}/secrets/SUPABASE_URL:env:SUPABASE_URL
            projects/${{ secrets.GCP_PROJECT_ID }}/secrets/SUPABASE_SERVICE_KEY:env:SUPABASE_SERVICE_KEY

      - name: Check required production secrets
        shell: bash
        env:
          PAYOS_CLIENT_ID: ${{ secrets.PAYOS_CLIENT_ID }}
          PAYOS_API_KEY: ${{ secrets.PAYOS_API_KEY }}
          PAYOS_CHECKSUM_KEY: ${{ secrets.PAYOS_CHECKSUM_KEY }}
          PAYOS_RETURN_URL: ${{ secrets.PAYOS_RETURN_URL }}
          PAYOS_CANCEL_URL: ${{ secrets.PAYOS_CANCEL_URL }}
          PAYOS_WEBHOOK_URL: ${{ secrets.PAYOS_WEBHOOK_URL }}
          PAYOS_WEB_RETURN_URL: ${{ secrets.PAYOS_WEB_RETURN_URL }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
        run: |
          echo "Checking required production secrets..."
          # Accept secrets from either GitHub Secrets or fetched env vars
          if [ -z "${{ secrets.GEMINI_API_KEY_PRIMARY }}" ] && [ -z "${{ secrets.GEMINI_API_KEY }}" ] && [ -z "$GEMINI_API_KEY" ] && [ -z "$GEMINI_API_KEY_PRIMARY" ]; then echo "ERROR: GEMINI_API_KEY_PRIMARY or GEMINI_API_KEY not set"; exit 1; fi
          if [ -z "${{ secrets.SUPABASE_URL }}" ] && [ -z "$SUPABASE_URL" ]; then echo "ERROR: SUPABASE_URL not set"; exit 1; fi
          if [ -z "${{ secrets.SUPABASE_SERVICE_KEY }}" ] && [ -z "$SUPABASE_SERVICE_KEY" ]; then echo "ERROR: SUPABASE_SERVICE_KEY not set"; exit 1; fi
          if [ -z "$PAYOS_CLIENT_ID" ]; then echo "ERROR: PAYOS_CLIENT_ID not set"; exit 1; fi
          if [ -z "$PAYOS_API_KEY" ]; then echo "ERROR: PAYOS_API_KEY not set"; exit 1; fi
          if [ -z "$PAYOS_CHECKSUM_KEY" ]; then echo "ERROR: PAYOS_CHECKSUM_KEY not set"; exit 1; fi
          for key in PAYOS_RETURN_URL PAYOS_CANCEL_URL PAYOS_WEBHOOK_URL PAYOS_WEB_RETURN_URL ALLOWED_ORIGINS; do
            value="${!key}"
            if [ -z "$value" ]; then echo "ERROR: $key not set"; exit 1; fi
            if echo "$value" | grep -Eq 'localhost|127\.0\.0\.1|trycloudflare\.com|ngrok-free\.dev'; then
              echo "ERROR: $key uses a local or temporary hostname"; exit 1
            fi
            if [ "$key" != "ALLOWED_ORIGINS" ] && ! echo "$value" | grep -Eq '^https://'; then
              echo "ERROR: $key must use HTTPS"; exit 1
            fi
          done
          echo "All required secrets present."
