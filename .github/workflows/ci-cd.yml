name: CI/CD - Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # Job 1: Lint & Type Check
  lint-and-typecheck:
    runs-on: ubuntu-latest
    name: Lint & TypeScript Check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint --workspace=backend

      - name: TypeScript check backend
        run: cd apps/backend && npx tsc --noEmit

      - name: TypeScript check mobile
        run: cd apps/mobile && npx tsc --noEmit

  # Job 2: Backend Unit Tests
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend Unit Tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calorie_ai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run backend unit tests
        run: npm run test --workspace=backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/calorie_ai_test
          NODE_ENV: test

      - name: Run backend coverage check
        run: npm run test:cov --workspace=backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/calorie_ai_test
          NODE_ENV: test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/backend/coverage/coverage-final.json
          flags: backend
          name: backend-coverage

  # Job 3: Mobile Type & Lint Check
  mobile-check:
    runs-on: ubuntu-latest
    name: Mobile Build & Type Check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Mobile TypeScript check
        run: cd apps/mobile && npx tsc --noEmit

      - name: Mobile lint
        run: npm run lint --workspace=mobile

  # Job 4: Build Backend
  build-backend:
    runs-on: ubuntu-latest
    name: Build Backend
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Upload backend build
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: apps/backend/dist/
          retention-days: 7

  # Job 5: Smoke Tests (E2E)
  smoke-tests:
    runs-on: ubuntu-latest
    name: Smoke Tests
    needs: [backend-tests]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calorie_ai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm run test:e2e --workspace=backend -- smoke
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/calorie_ai_test
          NODE_ENV: test

  # Job 6: Quality Gates
  quality-gate:
    runs-on: ubuntu-latest
    name: Quality Gate Check
    needs: [lint-and-typecheck, backend-tests, mobile-check, build-backend]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calorie_ai_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check backend test coverage
        run: npm run test:cov --workspace=backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/calorie_ai_test
          NODE_ENV: test

      - name: Report status
        if: always()
        run: |
          echo "::notice::CI/CD Pipeline Complete"
          echo "::notice::Quality gate job reached report step. Check upstream job statuses for details."

  # Job 7: Comment PR with results
  comment-pr:
    runs-on: ubuntu-latest
    name: Comment PR Results
    if: github.event_name == 'pull_request' && always()
    needs: [quality-gate]
    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ needs.quality-gate.result }}';
            const status = result === 'success' ? 'PASS' : 'FAIL';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${status} CI/CD Pipeline Results\n\nQuality gate result: ${result}`
            })

  # Job 8: Mobile Web E2E (Playwright)
  mobile-e2e:
    runs-on: ubuntu-latest
    name: Mobile Web E2E
    needs: [smoke-tests, mobile-check]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Run mobile web E2E
        run: cd apps/mobile && npm run e2e:ci

  # Job 9: Mobile EAS Android preview build (optional)
  mobile-eas-build:
    runs-on: ubuntu-latest
    name: Mobile EAS Android Preview Build
    needs: [mobile-e2e]
    steps:
      - uses: actions/checkout@v4

      - name: Detect optional EAS secrets
        id: eas-config
        shell: bash
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$EXPO_TOKEN" ]; then
            echo "expo_token_present=true" >> "$GITHUB_OUTPUT"
          else
            echo "expo_token_present=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "android_keystore_present=true" >> "$GITHUB_OUTPUT"
          else
            echo "android_keystore_present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip optional EAS build when EXPO_TOKEN is missing
        if: ${{ steps.eas-config.outputs.expo_token_present != 'true' }}
        run: echo "EXPO_TOKEN is not set; skipping optional EAS Android preview build."

      - name: Setup Node.js
        if: ${{ steps.eas-config.outputs.expo_token_present == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        if: ${{ steps.eas-config.outputs.expo_token_present == 'true' }}
        run: npm ci

      - name: Configure expo token
        if: ${{ steps.eas-config.outputs.expo_token_present == 'true' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "EXPO_TOKEN is set"

      - name: Restore Android keystore (from secrets)
        if: ${{ steps.eas-config.outputs.expo_token_present == 'true' && steps.eas-config.outputs.android_keystore_present == 'true' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "Restoring Android keystore from secrets"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > ./android.keystore
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Run EAS Android preview build
        if: ${{ steps.eas-config.outputs.expo_token_present == 'true' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd apps/mobile
          if [ -f ./android.keystore ]; then
            echo "Keystore restored, configure EAS credentials here if required"
          fi
          npm run build:android:preview
